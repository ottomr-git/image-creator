<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>配圖製作工具 — RIMAN 力曼</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <nav class="riman-nav">
    <div class="riman-nav-inner">
      <a class="riman-nav-home" href="/">RIMAN 工具箱</a>
      <div class="riman-nav-tools">
        <a href="/skin-consultation/">🌿 肌膚檢測</a>
        <a href="/product-calculator/">🧮 產品計算機</a>
        <a href="/image-creator/" class="active">🎨 配圖製作</a>
        <a href="/riman-reward/">💡 新制度解讀</a>
      </div>
    </div>
  </nav>
  <style>
    .riman-nav{position:sticky;top:0;z-index:999;background:#fff;border-bottom:1px solid #E8E0D0;font-family:'Noto Sans TC',-apple-system,sans-serif;}
    .riman-nav-inner{max-width:900px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:16px;height:44px;}
    .riman-nav-home{font-size:13px;font-weight:700;letter-spacing:1px;color:#B8860B;text-decoration:none;white-space:nowrap;flex-shrink:0;}
    .riman-nav-home::after{content:'·';margin-left:16px;color:#E8E0D0;}
    .riman-nav-tools{display:flex;align-items:center;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
    .riman-nav-tools::-webkit-scrollbar{display:none;}
    .riman-nav-tools a{font-size:12.5px;color:#888;text-decoration:none;padding:5px 10px;border-radius:20px;white-space:nowrap;transition:all .2s;}
    .riman-nav-tools a:hover{color:#B8860B;background:#FAF6EE;}
    .riman-nav-tools a.active{color:#B8860B;background:#FAF6EE;font-weight:500;}
  </style>

  <header class="header">
    <div class="container">
      <div class="brand-badge">RIMAN</div>
      <h1>配圖製作工具</h1>
      <p class="subtitle">輸入描述或上傳參考圖，一鍵生成品牌配圖</p>
    </div>
  </header>

  <main class="container">

    <!-- 輸入區 -->
    <section class="section">
      <label class="label">圖片描述</label>
      <textarea class="input-prompt" id="prompt" placeholder="例如：一位亞洲女性在使用保養品，背景為淺金色調，溫暖柔和的光線" rows="3"></textarea>
    </section>

    <!-- 產品選擇器 -->
    <section class="section">
      <label class="label">選擇力曼產品 <span class="label-hint">（選填，選後自動帶入參考圖）</span></label>
      <div class="product-scroll" id="product-scroll"></div>
    </section>

    <!-- 參考圖片上傳 -->
    <section class="section">
      <label class="label">自訂參考圖片 <span class="label-hint">（選填）</span></label>
      <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
        <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFileUpload(event)">
        <div class="upload-placeholder" id="upload-placeholder">
          <span class="upload-icon">&#128247;</span>
          <span>點擊或拖曳上傳參考圖片</span>
        </div>
        <div class="upload-preview" id="upload-preview" style="display:none">
          <img id="preview-img" src="" alt="preview">
          <button class="remove-btn" onclick="removeImage(event)">&#10005;</button>
        </div>
      </div>
    </section>

    <!-- 用途選擇 -->
    <section class="section">
      <label class="label">圖片用途</label>
      <div class="option-grid" id="purpose-options">
        <div class="option-card selected" data-value="social" onclick="selectPurpose(this)">
          <div class="option-ratio">1:1</div>
          <div class="option-name">社群貼文</div>
        </div>
        <div class="option-card" data-value="message" onclick="selectPurpose(this)">
          <div class="option-ratio">1:1</div>
          <div class="option-name">圖文訊息</div>
        </div>
        <div class="option-card" data-value="slide-h" onclick="selectPurpose(this)">
          <div class="option-ratio">16:9</div>
          <div class="option-name">簡報配圖</div>
        </div>
        <div class="option-card" data-value="slide-v" onclick="selectPurpose(this)">
          <div class="option-ratio">9:16</div>
          <div class="option-name">簡報配圖</div>
        </div>
      </div>
    </section>

    <!-- 輸出方式 -->
    <section class="section">
      <label class="label">輸出方式</label>
      <div class="toggle-group" id="output-mode">
        <button class="toggle-btn active" data-value="image-text" onclick="selectOutput(this)">圖加文</button>
        <button class="toggle-btn" data-value="text-only" onclick="selectOutput(this)">純文字描述</button>
      </div>
    </section>

    <!-- 生成按鈕 -->
    <div class="action-area">
      <button class="btn-generate" id="btn-generate" onclick="generate()">生成圖片</button>
    </div>

    <!-- 結果區 -->
    <section class="section result-area" id="result-area" style="display:none">
      <label class="label">生成結果</label>

      <!-- Loading -->
      <div class="loading" id="loading" style="display:none">
        <div class="spinner"></div>
        <p>圖片生成中，請稍候…</p>
      </div>

      <!-- 圖片結果 -->
      <div id="result-content" style="display:none">
        <div class="result-image-wrapper" id="result-image-wrapper" style="display:none">
          <img id="result-image" src="" alt="generated image">
        </div>
        <div class="result-text" id="result-text" style="display:none"></div>
        <div class="result-actions">
          <button class="btn-download" id="btn-download" onclick="downloadImage()" style="display:none">下載圖片</button>
          <button class="btn-retry" onclick="generate()">重新生成</button>
        </div>
      </div>

      <!-- 錯誤 -->
      <div class="error-msg" id="error-msg" style="display:none"></div>
    </section>

  </main>

  <footer class="footer">
    <p>© 2026 我是嘟嘟董事
      <a href="https://www.instagram.com/iamdodo.riman/" target="_self" class="ig-link" aria-label="Instagram">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
          <circle cx="12" cy="12" r="4"></circle>
          <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"></circle>
        </svg>
      </a>
    </p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
